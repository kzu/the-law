<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1;
  background: #fff;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 auto;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

/* Resizable sidebar */
#resizer {
  width: 5px;
  flex: 0 0 auto;
  background-color: #e2e8f0;
  cursor: col-resize;
  position: relative;
  z-index: 20;
  transition: background-color 0.1s ease;
  user-select: none;
}

#resizer:hover,
#resizer:active {
  background-color: #64748b;
}

#resizer::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
  background-color: #cbd5e1;
}

#graph {
  min-width: 200px;
}

#detail {
  min-width: 220px;
  flex: 0 0 auto;
  width: 40%; /* default, JS can override and persist */
}

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <div id="resizer" aria-label="Resize sidebar" title="Drag to resize sidebar"></div>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

e":"socialism/playing-god","target":"fundamental-principles/law-as-organization-of-defense"}},{"data":{"id":"sp_tprop","source":"socialism/playing-god","target":"true-law/proper-sphere"}},{"data":{"id":"sp_ld","source":"socialism/playing-god","target":"legal-plunder/definition"}},{"data":{"id":"ss_t","source":"socialism/socialist-doctrine","target":"the-law"}},{"data":{"id":"ss_fna","source":"socialism/socialist-doctrine","target":"fundamental-principles/natural-rights"}},{"data":{"id":"ss_flaw-","source":"socialism/socialist-doctrine","target":"fundamental-principles/law-as-organization-of-defense"}},{"data":{"id":"ss_tprop","source":"socialism/socialist-doctrine","target":"true-law/proper-sphere"}},{"data":{"id":"ss_ld","source":"socialism/socialist-doctrine","target":"legal-plunder/definition"}},{"data":{"id":"t_fna","source":"the-law","target":"fundamental-principles/natural-rights"}},{"data":{"id":"t_flaw-","source":"the-law","target":"fundamental-principles/law-as-organization-of-defense"}},{"data":{"id":"t_tprop","source":"the-law","target":"true-law/proper-sphere"}},{"data":{"id":"t_ld","source":"the-law","target":"legal-plunder/definition"}},{"data":{"id":"t_lcr","source":"the-law","target":"legal-plunder/consequences/rent-seeking"}},{"data":{"id":"t_mc","source":"the-law","target":"modern-relevance/contemporary-plunder"}},{"data":{"id":"t_pef","source":"the-law","target":"perversion-of-law/false-philanthropy"}},{"data":{"id":"tl_t","source":"true-law/limited-government","target":"the-law"}},{"data":{"id":"tl_fna","source":"true-law/limited-government","target":"fundamental-principles/natural-rights"}},{"data":{"id":"tl_ld","source":"true-law/limited-government","target":"legal-plunder/definition"}},{"data":{"id":"tne_t","source":"true-law/negative-role","target":"the-law"}},{"data":{"id":"tne_fna","source":"true-law/negative-role","target":"fundamental-principles/natural-rights"}},{"data":{"id":"tne_ld","source":"true-law/negative-role","target":"legal-plunder/definition"}},{"data":{"id":"tne_flaw-","source":"true-law/negative-role","target":"fundamental-principles/law-as-organization-of-defense"}},{"data":{"id":"tne_tprop","source":"true-law/negative-role","target":"true-law/proper-sphere"}},{"data":{"id":"tno_t","source":"true-law/non-intervention","target":"the-law"}},{"data":{"id":"tno_fna","source":"true-law/non-intervention","target":"fundamental-principles/natural-rights"}},{"data":{"id":"tno_ld","source":"true-law/non-intervention","target":"legal-plunder/definition"}},{"data":{"id":"tprop_t","source":"true-law/proper-sphere","target":"the-law"}},{"data":{"id":"tprop_fna","source":"true-law/proper-sphere","target":"fundamental-principles/natural-rights"}},{"data":{"id":"tprop_ld","source":"true-law/proper-sphere","target":"legal-plunder/definition"}},{"data":{"id":"tprop_flaw-","source":"true-law/proper-sphere","target":"fundamental-principles/law-as-organization-of-defense"}},{"data":{"id":"tprop_lcr","source":"true-law/proper-sphere","target":"legal-plunder/consequences/rent-seeking"}},{"data":{"id":"tprop_mc","source":"true-law/proper-sphere","target":"modern-relevance/contemporary-plunder"}},{"data":{"id":"tprop_pef","source":"true-law/proper-sphere","target":"perversion-of-law/false-philanthropy"}},{"data":{"id":"tprot_t","source":"true-law/protection-of-rights","target":"the-law"}},{"data":{"id":"tprot_fna","source":"true-law/protection-of-rights","target":"fundamental-principles/natural-rights"}},{"data":{"id":"tprot_ld","source":"true-law/protection-of-rights","target":"legal-plunder/definition"}}],"bodies":{"foreword":"\r\n# Foreword\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nDiLorenzo emphasizes Bastiat's anticipation of rent-seeking and the corruption of education and charity by the state. America came closest to the ideal except for slavery and tariffs.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Government's only legitimate end is protection of life, liberty, and property. (see Natural Rights).\r\n- Legal plunder includes tariffs, subsidies, progressive taxes, public schooling, welfare. (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/collective-force":"\r\n# Collective Force\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nIndividuals may combine their right of defense into a regular common force. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- The common force inherits exactly the same moral limits as individual force.\r\n- It cannot lawfully be used for plunder. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/justice":"\r\n# Justice\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw's mission is to cause justice to reign by protecting rights equally. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- When law sanctions plunder the distinction between justice and injustice disappears. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/law-as-organization-of-defense":"\r\n# Law Defined\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThis is the central thesis. Law has no other legitimate mission. When it goes beyond defense it becomes plunder. This definition is referenced from almost every other concept in the bundle.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Collective force may only do what the individual may lawfully do. (see Natural Rights).\r\n- Results in minimal, just, stable government. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/lawful-defense":"\r\n# Lawful Defense\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nEvery person has a natural right to defend life, liberty and property. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Defense is the origin of legitimate force. (see Natural Rights).\r\n- Collective right derives directly from it. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/natural-rights":"\r\n# Natural Rights\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThese three gifts precede and justify law. Any statute violating them is illegitimate. See how they ground the [definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Three elements: personality (individuality), liberty, property. (see Natural Rights).\r\n- Legislation must serve them, not create or destroy them. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n","fundamental-principles/non-aggression-principle":"\r\n# Non-Aggression\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nForce has not been given us to annihilate the equal rights of others. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- This limit applies equally to the state.\r\n- Foundation of limited government. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/order-and-stability":"\r\n# Order and Stability\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nA government that only protects produces the most stable and natural social order. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- No artificial displacements of capital or population.\r\n- Individuals bear responsibility for success and misfortune. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","fundamental-principles/personality-liberty-property":"\r\n# Personality, Liberty, and Property\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe three constitutive elements of man. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- They are interdependent extensions of one another.\r\n- Property is the fruit of faculties applied to the world. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","historical-context/1850-france":"\r\n# France 1850\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe immediate setting of the essay.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Bastiat served as a deputy.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","historical-context/american-ideal":"\r\n# American Ideal\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nProtection of life, liberty, property.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Two great exceptions noted: slavery and protectionist tariffs.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","historical-context/slavery-and-tariffs-exception":"\r\n# Exceptions\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nHe would have been horrified by later developments.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","key-extracts/extract-conclusion":"\r\n# Conclusion\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> The safest way to make laws respected is to make them respectable.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-consequences1":"\r\n# Justice vs Law\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> It would efface from everybody's conscience the distinction between justice and injustice.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","key-extracts/extract-consequences2":"\r\n# Politics\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> It gives to ... politics ... an exaggerated importance.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","key-extracts/extract-government-role":"\r\n# Government Role\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> If law were confined to causing all persons, all liberties, and all properties to be respected ...\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-law-definition":"\r\n# Law Definition\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> The law is the organization of the natural right of lawful defense...\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-perversion-causes":"\r\n# Causes\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> The law has been perverted through ... naked greed and misconceived philanthropy.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-plunder-origin":"\r\n# Origin of Plunder\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> Man can only derive life ... This is the origin of property. ... This is the origin of plunder.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-socialists":"\r\n# Socialists\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> Socialists want 'to play God' ... forced conformity; rigid regimentation ... dictatorship.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-suffrage":"\r\n# Suffrage\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> If the law may take from one party in order to give to another ... there is no class which may not try to place its hand upon the law.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-extracts/extract-three-gifts":"\r\n# Three Gifts\r\n\r\nThis passage comes from the discussion in [The Law](/the-law.md) and embodies the idea of [Natural Rights](/fundamental-principles/natural-rights.md).\r\n> We hold from God ... personality, liberty, property—this is man.\r\n\r\nThis quotation illustrates core ideas from [The Law](/the-law.md) and [the definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\nThis extract directly supports the analysis in [The Law](/the-law.md) and illustrates [legal plunder](/legal-plunder/definition.md).\r\n\r\nThis passage is discussed in the main analysis and directly illustrates the central [definition of law](/fundamental-principles/law-as-organization-of-defense.md) and the problem of [legal plunder](/legal-plunder/definition.md).\r\n","key-figures/frederic-bastiat":"\r\n# Frédéric Bastiat\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nDied 1850. Clear stylist and uncompromising defender of liberty. His work prefigures Austrian economics.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Also wrote the famous Candlemakers' petition against protectionism.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","key-figures/thomas-dilorenzo":"\r\n# Thomas J. DiLorenzo\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nHighlights continuing relevance against rent-seeking and state education.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","legal-plunder/consequences/class-conflict":"\r\n# Class Conflict\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nEvery group organizes to plunder or to defend against plunder. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","legal-plunder/consequences/corruption-of-education":"\r\n# Corruption of Education\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nState-paid teachers will not criticize the laws that pay them. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","legal-plunder/consequences/demoralization-of-citizens":"\r\n# Demoralization of Citizens\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nWhen law commands injustice citizens become cynics or accomplices. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n","legal-plunder/consequences/economic-impoverishment":"\r\n# Economic Impoverishment\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLegal plunder reduces total wealth even for many of its beneficiaries. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/consequences/effacing-justice":"\r\n# Effacing Justice\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw that sanctions plunder destroys the distinction between justice and injustice. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- People come to accept injustice if it is legal. (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/consequences/instability-and-revolution":"\r\n# Instability and Revolution\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nGeneralized plunder produces constant pressure for upheaval. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/consequences/loss-of-moral-sense":"\r\n# Loss of Moral Sense\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nCitizens must choose between conscience and respect for law. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/consequences/politicization-of-society":"\r\n# Politicization of Society\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nWhen law = plunder, politics becomes the main arena of life. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Everyone tries to live at the expense of everyone else.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/consequences/rent-seeking":"\r\n# Rent Seeking\r\n\r\nThis outcome follows directly from violating the ideas in [The Law](/the-law.md) and [Natural Rights](/fundamental-principles/natural-rights.md).\r\nResources spent obtaining political transfers rather than producing value. Direct result of the [perversion of law](/perversion-of-law/).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Opportunity cost impoverishes society as a whole.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","legal-plunder/definition":"\r\n# Definition of Legal Plunder\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe fatal principle that law may organize plunder. Once admitted, every class tries to capture the power to plunder. This page is one of the central hubs of the bundle.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Plunder made respectable by law. (see legal plunder).\r\n- Leads to universal plunder when the victims seize the legislature. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n","legal-plunder/manifestations/deeper/political-economy-of-tariffs":"\r\n# Political Economy\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nExplains why bad policy persists.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n","legal-plunder/manifestations/deeper/tariff-effects-on-consumers":"\r\n# Effects on Consumers\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nEvery tariff is a forced transfer.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Higher prices, less choice.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","legal-plunder/manifestations/forced-labor":"\r\n# Forced Labor\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nCompulsory service extracted by the state. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n","legal-plunder/manifestations/government-jobs-programs":"\r\n# Government Jobs Programs\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nMake-work at taxpayer expense. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Destroys real wealth.\r\n","legal-plunder/manifestations/minimum-wage-laws":"\r\n# Minimum Wage Laws\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nPrice floor on labor that creates unemployment. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- False philanthropy.\r\n","legal-plunder/manifestations/monopolies":"\r\n# Monopolies\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nState-granted exclusive privileges. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n","legal-plunder/manifestations/progressive-taxation":"\r\n# Progressive Taxation\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nUsing the tax code to redistribute. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Violates equal protection.\r\n","legal-plunder/manifestations/protectionism-and-tariffs":"\r\n# Protectionism & Tariffs\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nTariffs force consumers to subsidize producers. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Concentrated benefit, diffused cost.\r\n","legal-plunder/manifestations/public-schools":"\r\n# Public Schools\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nTax funded schooling used for indoctrination. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Professors defend the system that pays them.\r\n","legal-plunder/manifestations/subsidies":"\r\n# Subsidies\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nTax money given to favored groups. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- No risk for the recipient.\r\n","legal-plunder/manifestations/usury-laws":"\r\n# Usury Laws\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nInterest caps that reduce credit for the poor. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n","legal-plunder/manifestations/welfare":"\r\n# Welfare\r\n\r\nOne of the concrete forms of what [The Law](/the-law.md) calls [legal plunder](/legal-plunder/definition.md).\r\nOrganized transfer presented as the poor's right to plunder. Classic example of [legal plunder](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Creates client classes.\r\n","legal-plunder/universal-plunder":"\r\n# Universal Plunder\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nEquilibrium sought by everyone trying to plunder everyone else through the law. See [consequences](/legal-plunder/consequences/).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Injustice is generalized rather than abolished. (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","modern-relevance/contemporary-plunder":"\r\n# Contemporary Legal Plunder\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nTariffs, subsidies, entitlements, regulatory capture, occupational licensing all fit the pattern.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Higher prices and favors for politically connected interests.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","modern-relevance/influence-on-austrian-economics":"\r\n# Influence on Austrian Economics\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nPrecursor emphasis on spontaneous order and critique of intervention.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Mises Institute keeps the work in print.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","modern-relevance/influence-on-libertarianism":"\r\n# Influence on Libertarianism\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nFoundational text for natural-rights e.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Two very different motives produce the same evil.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","perversion-of-law/false-philanthropy":"\r\n# False Philanthropy\r\n\r\nThis illustrates how law becomes corrupted, as analyzed in [The Law](/the-law.md).\r\nThe desire to do good to some by robbing others via law.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- True charity is voluntary.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","perversion-of-law/greed":"\r\n# Greed\r\n\r\nThis illustrates how law becomes corrupted, as analyzed in [The Law](/the-law.md).\r\nLegislators using power to live at others' expense.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Where plunder is easier than labor it prevails. (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","perversion-of-law/introduction-to-perversion":"\r\n# The Law Perverted\r\n\r\nThis illustrates how law becomes corrupted, as analyzed in [The Law](/the-law.md).\r\nLaw diverted from protection to predation.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Becomes the tool of avarice instead of its check.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","perversion-of-law/law-as-instrument-of-plunder":"\r\n# Law as Plunder Instrument\r\n\r\nThis illustrates how law becomes corrupted, as analyzed in [The Law](/the-law.md).\r\nLaw protects plunderers es dramatically. (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","related-concepts/free-trade":"\r\n# Free Trade\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nExchange is production. Barriers are plunder.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/individual-rights":"\r\n# Individual Rights\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe moral unit is the individual; collective force exists only to protect individuals.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/limited-vs-activist-state":"\r\n# Limited vs Activist State\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe activist state that tries to organize everything becomes the central plunderer.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/natural-law":"\r\n# Natural Law\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nRights inhere in human nature; positive law (see [/fundamental-principles/law-as-organization-of-defense.md](/fundamental-principles/law-as-organization-of-defense.md)) is valid only insofar as it recognizes them.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/philanthropy-vs-coercion":"\r\n# Voluntary vs Coerced\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nTrue giving requires a willing giver. Coercion destroys the moral act.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/property-rights":"\r\n# Property Rights\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nProperty is the extension of faculties. Attacks on property are attacks on liberty and personality.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/rule-of-law":"\r\n# Rule of Law\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw must be general and equal. Targeting specific groups for plunder violates the rule of law.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","related-concepts/spontaneous-order":"\r\n# Spontaneous Order\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nWhen law stays within its sphere, order emerges naturally.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md).\r\n","socialism/critique-of-charity":"\r\n# Critique of Coercive Charity\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nTaking by taxation is not charity.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Destroys genuine voluntary giving.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","socialism/education-as-indoctrination":"\r\n# Education as Indoctrination\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nState schools serve the state that funds them.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n","socialism/forced-conformity":"\r\n# Forced Conformity\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nRegulation and regimentation imposed on the whole population.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n","socialism/playing-god":"\r\n# Playing God\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nSocialists want to remake man and society according to their plan.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Anticipates all later totalitarianism.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","socialism/socialist-doctrine":"\r\n# Socialist Doctrine\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe program of systematized legal plunder under philanthropic slogans.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Organize everything by force.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n","the-law":"\r\n# The Law (1850)\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nBastiat shows that life, liberty and property precede legislation. The law (see [/fundamental-principles/law-as-organization-of-defense.md](/fundamental-principles/law-as-organization-of-defense.md)) is the organization of the natural right of defense. When perverted (by greed or false philanthropy) it becomes an engine of legal plunder. The remedy is to return law strictly to its defensive sphere. See also the detailed treatment of the [core definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Personality, liberty and property are natural and pre-political. (see Natural Rights).\r\n- Law = collective force organized only for protection. (see Natural Rights).\r\n- Perversion turns law into legalized theft benefiting some at expense of others.\r\n- Consequences: moral confusion, politicized society, rent-seeking, impoverishment.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n","true-law/limited-government":"\r\n# Limited Government\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe most restrained government is the most just and stable. Contrasted with the [perverted law](/legal-plunder/definition.md).\r\n","true-law/negative-role":"\r\n# Negative Role of Law\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw represses injustice; it does not positively organize society. Contrasted with the [perverted law](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Positive interventions are the source of plunder. (see legal plunder).\r\n","true-law/non-intervention":"\r\n# Non-Intervention\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nWants and satisfactions develop in their natural order. Contrasted with the [perverted law](/legal-plunder/definition.md).\r\n","true-law/proper-sphere":"\r\n# Proper Sphere of Law\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw confined to protecting persons, liberties and properties. Contrasted with the [perverted law](/legal-plunder/definition.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- If law stayed here political disputes would lose most of their bitterness. (see Natural Rights). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n","true-law/protection-of-rights":"\r\n# Protection of Rights\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe only legitimate end of collective force. Contrasted with the [perverted law](/legal-plunder/definition.md).\r\n"},"types":["Application","Biography","Concept","Consequence","Core Principle","Critique","Definition","Essay","Foreword","Historical Context","Manifestation","Quotation","Related Idea"],"palette":{"BigQuery Dataset":"#8b5cf6","BigQuery Table":"#3b82f6","Reference":"#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  const slugToId = {};
  for (const n of bundle.nodes) {
    const d = n.data;
    nodeIndex[d.id] = d;
    if (d.slug) slugToId[d.slug] = d.id;
  }

  // Create Cytoscape instance WITHOUT an initial layout so we can
  // pre-position high-weight nodes near the center.
  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": "data(fontSize)",
          "font-weight": 500,
          "text-valign": "bottom",
          "text-halign": "center",
          "text-margin-y": 6,
          "text-wrap": "wrap",
          "text-max-width": 140,
          // Label readability: white rounded background so text doesn't disappear
          // on top of edges or other nodes
          "text-background-color": "#ffffff",
          "text-background-opacity": 0.88,
          "text-background-shape": "roundrectangle",
          "text-background-padding": 3,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
          "z-index": 10,
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    wheelSensitivity: 0.2,
  });

  // Pre-position the highest-weight nodes near the center.
  // This strongly encourages the force layout to keep important hubs central
  // and produces much nicer results for bundles that have a few dominant concepts.
  try {
    const withWeight = bundle.nodes
      .map((n) => ({ id: n.data.id, w: n.data.weight || 0 }))
      .sort((a, b) => b.w - a.w);
    const top = withWeight.slice(0, 7);
    const cx = 0;
    const cyC = 0;
    top.forEach((item, i) => {
      const el = cy.getElementById(item.id);
      if (el && el.length > 0) {
        const angle = (2 * Math.PI * i) / Math.max(1, top.length);
        const radius = 55 + (i % 3) * 22;
        el.position({
          x: cx + Math.cos(angle) * radius,
          y: cyC + Math.sin(angle) * radius,
        });
      }
    });
  } catch (e) {
    // non-fatal
  }

  // Improved COSE defaults: more spread, respect labels for positioning,
  // stronger central gravity (helps high-weight nodes stay central),
  // and nodeDimensionsIncludeLabels so the layout accounts for text size.
  const runCose = () => {
    cy.layout({
      name: "cose",
      animate: false,
      padding: 55,
      nodeRepulsion: 7200,
      idealEdgeLength: 52,
      edgeElasticity: 95,
      nestingFactor: 1.25,
      gravity: 1.9, // stronger pull toward center benefits high-weight hubs
      numIter: 1400,
      initialTemp: 180,
      coolingFactor: 0.955,
      minTemp: 0.9,
      nodeDimensionsIncludeLabels: true,
    }).run();
  };

  // Run improved cose on init
  runCose();

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    const name = e.target.value;
    if (name === "cose") {
      runCose();
    } else {
      // Reasonable settings for other built-in layouts
      const opts = { name, animate: false, padding: 50 };
      if (name === "concentric" || name === "circle") {
        opts.nodeDimensionsIncludeLabels = true;
      }
      cy.layout(opts).run();
    }
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    // Clear hash for clean state (replace to avoid history spam)
    if (location.hash) {
      try { history.replaceState(null, "", location.pathname + location.search); } catch (_) {}
    }
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function getIdFromHash() {
    const h = location.hash;
    if (!h || h === "#") return null;
    let candidate;
    try {
      candidate = decodeURIComponent(h.slice(1));
    } catch (_) {
      candidate = h.slice(1);
    }
    if (nodeIndex[candidate]) return candidate;
    if (slugToId[candidate]) return slugToId[candidate];
    return null;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;

    // Update URL hash using the slug (nice + short) when available; falls back to full id.
    // This gives pretty shareable links like #fl instead of #fundamental-principles/...
    const hashId = data.slug || conceptId;

    try {
      // encode but keep slashes pretty for readability
      const newHash = "#" + encodeURIComponent(hashId).replace(/%2F/gi, "/");
      if (location.hash !== newHash) {
        history.replaceState(null, "", newHash);
      }
    } catch (_) {}

    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // === Resizable sidebar ===
  const resizerEl = document.getElementById('resizer');
  const graphEl = document.getElementById('graph');
  const detailEl = document.getElementById('detail');

  if (resizerEl && graphEl && detailEl) {
    let isDragging = false;

    const STORAGE_KEY = 'viz-sidebar-width';

    function applyWidth(pxWidth) {
      const min = 220;
      const max = Math.max(min, window.innerWidth * 0.65);
      const w = Math.max(min, Math.min(max, pxWidth));
      detailEl.style.width = `${w}px`;
      graphEl.style.flex = '1 1 0';
    }

    function saveWidth() {
      try { localStorage.setItem(STORAGE_KEY, detailEl.style.width); } catch (_) {}
    }

    function loadWidth() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          applyWidth(parseFloat(saved));
        } else {
          // default from CSS (40%)
          // ensure graph takes the rest
          graphEl.style.flex = '1 1 0';
        }
      } catch (_) {
        graphEl.style.flex = '1 1 0';
      }
    }

    // Initialize
    loadWidth();

    resizerEl.addEventListener('mousedown', (e) => {
      isDragging = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const container = detailEl.parentElement.getBoundingClientRect();
      const newDetailWidth = container.right - e.clientX;
      applyWidth(newDetailWidth);
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        saveWidth();
      }
    });

    // Double-click resizer to reset
    resizerEl.addEventListener('dblclick', () => {
      detailEl.style.width = '40%';
      graphEl.style.flex = '1 1 0';
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    });

    // Keep proportions reasonable on window resize
    window.addEventListener('resize', () => {
      if (detailEl.style.width && detailEl.style.width.endsWith('px')) {
        applyWidth(parseFloat(detailEl.style.width));
      }
    });
  }

  // Initial selection: prefer a valid hash fragment (#node-id), else default to a dataset or first node.
  // Hash support enables shareable links that open with a specific node pre-selected.
  const hashId = getIdFromHash();
  if (hashId && nodeIndex[hashId]) {
    showDetail(hashId);
  } else {
    // Clean up any invalid/empty hash on load
    if (location.hash) {
      try { history.replaceState(null, "", location.pathname + location.search); } catch (_) {}
    }
    const initial =
      bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
      bundle.nodes[0];
    if (initial) showDetail(initial.data.id);
  }

  // Support browser back/forward and direct hash edits
  window.addEventListener("hashchange", () => {
    const id = getIdFromHash();
    if (id && nodeIndex[id]) {
      showDetail(id);
    } else {
      clearSelection();
    }
  });
})();

</script>
</body>
</html>
